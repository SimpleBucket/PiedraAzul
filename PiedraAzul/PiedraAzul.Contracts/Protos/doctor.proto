syntax = "proto3";
import "Protos/common.proto";

option csharp_namespace = "Shared.Grpc";

package doctor;

service DoctorService {

  rpc GetDoctors (common.Empty) returns (DoctorListResponse);

  rpc GetDoctor (DoctorRequest) returns (DoctorResponse);
  rpc GetDoctorsByType(DoctorTypeRequest) returns (DoctorListResponse);
}

enum DoctorType
{
    NaturalMedicine = 0;
    Chiropractic = 1;
    Optometry = 2;
    Physiotherapy = 3;

}
message DoctorTypeRequest {
  DoctorType doctorType = 1;
}
message DoctorRequest {
  string doctorId = 1;
}

message DoctorResponse {
  string doctorId = 1;
  string userId = 2;

  string name = 3;
  DoctorType specialty = 4;
  string licenseNumber = 5;
  string notes = 6;
  string avatarUrl = 7;
}

message DoctorListResponse {
  repeated DoctorResponse doctors = 1;
}

