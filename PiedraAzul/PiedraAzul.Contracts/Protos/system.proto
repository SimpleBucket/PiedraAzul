syntax = "proto3";
import "Protos/common.proto";

option csharp_namespace = "Shared.Grpc";

package system;

service SystemConfigService {

  rpc GetConfig (common.Empty) returns (SystemConfigResponse);

  rpc UpdateConfig (UpdateSystemConfigRequest) returns (SystemConfigResponse);
}

message SystemConfigResponse {
  string id = 1;

  int32 bookingWindowWeeks = 2;
}

message UpdateSystemConfigRequest {
  int32 bookingWindowWeeks = 1;
}

