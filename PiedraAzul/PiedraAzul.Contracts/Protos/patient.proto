syntax = "proto3";

option csharp_namespace = "Shared.Grpc";

package patient;

service PatientService {
  rpc SearchAutoCompletePatients (SearchPatientsRequest) returns (SearchPatientsResponse);
  rpc SearchPatients(SearchPatientsRequest) returns (SearchPatientsResponse);
}

message SearchPatientsRequest {
  string query = 1;        
  int32 limit = 2;         
}

message SearchPatientsResponse {
  repeated PatientSearchResult patients = 1;
}

message PatientSearchResult {
  string id = 1;                
  string name = 2;
  string identification = 3;
  string phone = 4;

  PatientType type = 5;         
}

enum PatientType {
  UNKNOWN = 0;
  REGISTERED = 1;
  GUEST = 2;
}