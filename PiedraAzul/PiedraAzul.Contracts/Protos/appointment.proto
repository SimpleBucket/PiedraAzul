syntax = "proto3";

option csharp_namespace = "Shared.Grpc";

package appointment;

import "google/protobuf/timestamp.proto";

service AppointmentService {

  rpc GetDoctorAppointments (DoctorAppointmentsRequest) returns (AppointmentListResponse);

  rpc CreateAppointment (CreateAppointmentRequest) returns (AppointmentResponse);

  rpc GetPatientAppointments (PatientAppointmentsRequest) returns (AppointmentListResponse);
}

message DoctorAppointmentsRequest {
  string doctorId = 1;
  google.protobuf.Timestamp date = 2;
}


message PatientAppointmentsRequest {
  oneof patient {
    string patientUserId = 1;
    string patientGuestId = 2;
  }
}


// (oneof)
message CreateAppointmentRequest {

  oneof patient {
    string patientUserId = 1;
    GuestPatientInput guest = 2;
  }

  string doctorId = 3;
  string doctorAvailabilitySlotId = 4;
  google.protobuf.Timestamp date = 5;
}

// Guest Input
message GuestPatientInput {
  string identification = 1;
  string name = 2;
  string phone = 3;
  string extraInfo = 4;
}


message AppointmentResponse {
  string id = 1;

  string patientUserId = 2;
  string patientGuestId = 3;

  string patientType = 4; // "registered" o "guest"
  string patientName = 5;

  string appointmentSlotId = 6;
  google.protobuf.Timestamp start = 7;
  google.protobuf.Timestamp createdAt = 8;
}

message AppointmentListResponse {
  repeated AppointmentResponse appointments = 1;
}