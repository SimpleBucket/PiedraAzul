syntax = "proto3";

option csharp_namespace = "Shared.Grpc";

package appointment;

import "google/protobuf/timestamp.proto";

service AppointmentService {

  rpc GetDoctorAppointments (DoctorAppointmentsRequest) returns (DoctorAppointmentsSearchResponse);

  rpc CreateAppointment (CreateAppointmentRequest) returns (AppointmentResponse);

  rpc GetPatientAppointments (PatientAppointmentsRequest) returns (AppointmentListResponse);
}

message DoctorAppointmentsRequest {
  string doctorId = 1;

  google.protobuf.Timestamp date = 2;
  int32 pageNumber = 3;
  int32 pageSize = 4;
}

message PatientAppointmentsRequest {
  string patientId = 1;
}


message CreateAppointmentRequest {
  // opcional (usuario registrado)
  string patientId = 1;

  // para invitados
  string patientIdentification = 2;
  string patientName = 3; 
  string patientPhone = 4;
  string patientExtraInfo = 5;

  //Doctor 
  string doctorId = 6;
  string doctorAvailabilitySlotId = 7;
  google.protobuf.Timestamp date = 8;
}


message AppointmentResponse {
  string id = 1;

  string patientId = 2;
  string patientGuestId = 3; // para pacientes invitados
  string patientType = 4; // "registered" o "guest"
  string patientName = 7; // nombre del paciente (usuario registrado o invitado)
  string appointmentSlotId = 5;
  google.protobuf.Timestamp start = 8;

  google.protobuf.Timestamp createdAt = 6;
}

message AppointmentListResponse {
  repeated AppointmentResponse appointments = 1;
}

message DoctorAppointmentItem {
  string appointmentId = 1;
  string timeRange = 2;
  string patient = 3;
  string patientType = 4;
  string specialty = 5;
  string status = 6;
  google.protobuf.Timestamp createdAt = 7;
  string patientName = 8;
  google.protobuf.Timestamp start = 9;
}

message DoctorAppointmentsSearchResponse {
  repeated DoctorAppointmentItem items = 1;
  int32 totalCount = 2;
  int32 pageNumber = 3;
  int32 pageSize = 4;
}