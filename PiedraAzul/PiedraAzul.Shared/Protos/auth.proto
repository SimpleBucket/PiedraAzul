syntax = "proto3";

import "google/protobuf/timestamp.proto";
option csharp_namespace = "Shared.Grpc";
import "Protos/common.proto";

package auth;

service AuthService {

  rpc Register (RegisterRequest) returns (AuthResponse);

  rpc Login (LoginRequest) returns (AuthResponse);

  rpc RefreshToken (RefreshTokenRequest) returns (AuthResponse);

  rpc RevokeToken (RevokeTokenRequest) returns (common.Empty);

  rpc GetCurrentUser (common.Empty) returns (UserResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;

  string identificationNumber = 3;
  string Name = 4;
  string phone = 5;

  GenderType gender = 6;
  repeated string roles = 7;
  google.protobuf.Timestamp birthDate = 8;
}

enum GenderType {
  GENDER_UNSPECIFIED = 0;
  MALE = 1;
  FEMALE = 2;
  OTHER = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {} 

message RevokeTokenRequest {} 

message AuthResponse {
  string accessToken = 1;
  UserResponse user = 2;
}

message UserResponse {
  string id = 1;
  string name =2;
  string email = 3;
  string identificationNumber = 4;

  int32 gender = 5;
  string birthDate = 6;

  repeated string roles = 7;
}