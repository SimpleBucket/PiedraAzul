syntax = "proto3";

option csharp_namespace = "Shared.Grpc";

package availability;

import "google/protobuf/timestamp.proto";

service AvailabilityService {

  rpc GetDoctorAvailability (DoctorAvailabilityRequest) returns (AvailabilityResponse);

  rpc GetAvailableSlots (AvailableSlotsRequest) returns (AvailableSlotsResponse);
}

message DoctorAvailabilityRequest {
  string doctorId = 1;
}

message AvailableSlotsRequest {
  string doctorId = 1;
  google.protobuf.Timestamp date = 2;
}

message AvailabilityBlock {
  string id = 1;

  int32 dayOfWeek = 2; 

  string startTime = 3; 
  string endTime = 4;   
}

message AvailabilityResponse {
  repeated AvailabilityBlock blocks = 1;
}

message Slot {
  string id = 1;

  google.protobuf.Timestamp start = 2;
  google.protobuf.Timestamp end = 3;

  bool isAvailable = 4;
}

message AvailableSlotsResponse {
  repeated Slot slots = 1;
}